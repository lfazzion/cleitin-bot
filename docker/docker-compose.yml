# Rede interna fechada — nenhum serviço expõe porta desnecessária
networks:
  internal:
    driver: bridge

services:
  # ── Serviço principal: API Puma ────────────────────────────────────────────
  app:
    image: cleitin-bot:${IMAGE_TAG:-latest}
    build:
      context: ..                    # raiz do projeto
      dockerfile: docker/Dockerfile  # relativo ao context
    env_file:
      - ../.env                      # variáveis de ambiente (não commitar)
    environment:
      RAILS_ENV: production
      CHROME_HOST: chrome
      CHROME_PORT: "9222"
      RAILS_LOG_TO_STDOUT: "true"
      XDG_CONFIG_HOME: /tmp/.chromium
      XDG_CACHE_HOME: /tmp/.chromium
    volumes:
      # Bind mount relativo ao docker-compose.yml → ../storage = raiz do projeto
      - storage-data:/rails/storage
    ports:
      - "3000:3000"
    depends_on:
      chrome:
        condition: service_healthy
    networks:
      - internal
    entrypoint: bin/entrypoint
    command: bin/rails server -b 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Serviço de Jobs: Solid Queue ──────────────────────────────────────────
  jobs:
    image: cleitin-bot:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env                      # variáveis de ambiente (não commitar)
    environment:
      RAILS_ENV: production
      CHROME_HOST: chrome
      CHROME_PORT: "9222"
      RAILS_LOG_TO_STDOUT: "true"
      XDG_CONFIG_HOME: /tmp/.chromium
      XDG_CACHE_HOME: /tmp/.chromium
    volumes:
      - storage-data:/rails/storage
    depends_on:
      chrome:
        condition: service_healthy
    networks:
      - internal
    entrypoint: bin/entrypoint-jobs
    command: bin/jobs start
    restart: unless-stopped

  # ── Discord Bot: Chatbot Tool Caller ─────────────────────────────────────
  discord-bot:
    image: cleitin-bot:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - storage-data:/rails/storage
    networks:
      - internal
    entrypoint: bin/discord-bot
    restart: unless-stopped

  # ── Chrome Headless Shell ─────────────────────────────────────────────────
  chrome:
    image: chromedp/headless-shell:stable
    # shm_size obrigatório: evita memory leak de renderização no Ferrum/Chrome 120+
    shm_size: '2gb'
    security_opt:
      - seccomp:unconfined
    ports:
      - "9222:9222"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "socat -u OPEN:/dev/null TCP:localhost:9222,connect-timeout=3 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Test Runner (on-demand) ─────────────────────────────────────────────
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    user: root
    env_file:
      - ../.env
    environment:
      RAILS_ENV: test
      CHROME_HOST: chrome
      CHROME_PORT: "9222"
    volumes:
      - ../:/rails
    networks:
      - internal
    profiles:
      - test
    entrypoint: bin/rails
    command: test

  # ── Python Scraper Sidecar ──────────────────────────────────────────────
  python-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.python
    volumes:
      - ../scripts/python:/app/scripts
      - scraping-data:/data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - internal
    restart: unless-stopped

  # ── SearXNG Web Search ───────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    env_file:
      - ../.env
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
    volumes:
      - ./searxng:/etc/searxng:ro
    networks:
      - internal
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  scraping-data:
  storage-data:
